<!DOCTYPE html>
<html>
<head>
    <title>Users API Project</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        .user-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        input {
            padding: 5px;
            margin-right: 5px;
        }
        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <h2>Users List</h2>

    <p id="loading">Loading...</p>

    <div>
        <input type="text" id="cityInput" placeholder="Enter city">
        <button id="filterCityBtn">Filter by City</button>
    </div>

    <br>

    <div>
        <input type="text" id="companySearch" placeholder="Search by company name">
    </div>

    <br>

    <div id="usersContainer"></div>

<script>

const container = document.getElementById("usersContainer");
const loadingText = document.getElementById("loading");
const cityInput = document.getElementById("cityInput");
const filterCityBtn = document.getElementById("filterCityBtn");
const companySearch = document.getElementById("companySearch");

let allUsers = [];

const fetchUsers = async () => {
    try {
        loadingText.textContent = "Loading...";
        
        const response = await fetch("https://jsonplaceholder.typicode.com/users");
        
        if (!response.ok) {
            throw new Error("Network response was not ok");
        }

        const data = await response.json();
        allUsers = data;

        loadingText.textContent = "";
        renderUsers(allUsers);

    } catch (error) {
        loadingText.textContent = "Failed to load data";
        console.log("Error:", error);
    }
};

function renderUsers(users) {
    container.innerHTML = "";

    if (users.length === 0) {
        container.innerHTML = "<p>No users found</p>";
        return;
    }

    users.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
            <h3>${user.name}</h3>
            <p>Email: ${user.email}</p>
            <p>Company: ${user.company.name}</p>
            <p>City: ${user.address.city}</p>
        `;

        container.appendChild(div);
    });
}

filterCityBtn.addEventListener("click", () => {
    const city = cityInput.value.toLowerCase();

    const filtered = allUsers.filter(user =>
        user.address.city.toLowerCase().includes(city)
    );

    renderUsers(filtered);
});

companySearch.addEventListener("input", () => {
    const searchValue = companySearch.value.toLowerCase();

    const filtered = allUsers.filter(user =>
        user.company.name.toLowerCase().includes(searchValue)
    );

    renderUsers(filtered);
});

fetchUsers();

</script>
