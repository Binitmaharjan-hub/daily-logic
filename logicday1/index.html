<!DOCTYPE html>
<html lang="en">
<head>
    <title>Day 4: Component Factory</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        #user-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        .card { 
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #007bff;
        }
        .error-msg { color: #721c24; background: #f8d7da; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Community Directory</h1>
    <div id="user-grid">Loading users...</div>

    <script>
        // 1. THE COMPONENT (The "Lego Brick")
        // We use destructuring to pull name, email, and city out of the user object
        const UserCard = ({ name, email, address }) => {
            return `
                <div class="card">
                    <h3>${name}</h3>
                    <p><strong>Email:</strong> ${email}</p>
                    <p><strong>City:</strong> ${address.city}</p>
                </div>
            `;
        };

        // 2. THE LOGIC (The "Factory")
        const renderUsers = async () => {
            const grid = document.getElementById("user-grid");

            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                
                // Check if response is okay (Standard API practice)
                if (!response.ok) throw new Error("Failed to fetch data");

                const users = await response.json();

                // THE MAGIC LINE: Map the data into components and join them
                // This is exactly what we do in React with JSX!
                grid.innerHTML = users.map(user => UserCard(user)).join("");

            } catch (error) {
                console.error(error);
                grid.innerHTML = `<div class="error-msg">Oops! Looks like the server is napping. 😴</div>`;
            }
        };

        // Initialize the app
        renderUsers();
    </script>
</body>
</html>
