<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search</title>
</head>
<body>
    <input type="text" placeholder="enter name to be searched" id="value"/>
    <div id="todisplay"></div>

    <script>
        let users = [];

        function render(data) {
            let display = data.map(info => {
                return `<p>
                    name: ${info.name},<br>
                    email: ${info.email},<br>
                    city: ${info.address.city}
                </p>`;
            }).join("");

            document.getElementById("todisplay").innerHTML = display;
        }

        function handleSearch(e) {
            const searchValue = e.target.value.toLowerCase();
            const filteredValue = users.filter(user =>
                user.name.toLowerCase().includes(searchValue)
            );
            render(filteredValue);
        }

        const frl = async () => {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                const data = await response.json();

                users = data;
                render(users);
            } catch (err) {
                console.log("error");
            }
        };

        document.getElementById("value")
            .addEventListener("input", handleSearch);

        frl();
    </script>
</body>
</html>
